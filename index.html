<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canaril Pro - Acesso Beatriz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Login Overlay */
        #loginScreen { position: fixed; top:0; left:0; width: 100%; height:100%; background: #27ae60; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 10px; width: 300px; text-align: center; }
        
        /* Painel Principal (Escondido antes do login) */
        #mainPanel { display: none; }

        h2 { color: #27ae60; text-align: center; }
        .tabs { display: flex; border-bottom: 2px solid #dee2e6; margin-bottom: 25px; justify-content: space-around; }
        .tab-btn { padding: 12px; cursor: pointer; border: none; background: none; color: #666; font-weight: bold; }
        .tab-btn.active { border-bottom: 4px solid #27ae60; color: #27ae60; }
        
        .content { display: none; }
        .content.active { display: block; }

        input, select, button { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; margin-top: 10px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #219150; }
        .btn-danger { background-color: #e74c3c; padding: 5px; font-size: 11px; margin: 0; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h3>Acesso Restrito</h3>
        <input type="text" id="userLogin" placeholder="Usuário">
        <input type="password" id="userPass" placeholder="Senha">
        <button onclick="verificarLogin()">Entrar</button>
        <p id="errorMsg" style="color: red; font-size: 12px; display: none;">Login ou senha incorretos!</p>
    </div>
</div>

<div class="container" id="mainPanel">
    <div style="text-align: right;"><small>Olá, <b>Beatriz</b>! | <a href="#" onclick="location.reload()">Sair</a></small></div>
    <h2>🐤 Painel de Controle - Beatriz</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('aves')">Aves</button>
        <button class="tab-btn" onclick="openTab('treino')">Treine Livre</button>
    </div>

    <div id="aves" class="content active">
        <h3>Cadastrar Ave</h3>
        <input type="text" id="aveNome" placeholder="Nome da Ave">
        <input type="text" id="aveAnilha" placeholder="Número da Anilha">
        <input type="date" id="aveNasc">
        <button onclick="adicionarAve()">Salvar Ave</button>

        <h3>Lista de Aves</h3>
        <table id="tabelaAves">
            <thead>
                <tr><th>Nome</th><th>Anilha</th><th>Nascimento</th><th>Ação</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="treino" class="content">
        <h3>Novo Treino</h3>
        <select id="selectAve"></select>
        <input type="text" id="treinoTempo" placeholder="Tempo de Canto (ex: 15 min)">
        <input type="date" id="treinoData">
        <button onclick="adicionarTreino()">Gravar Resultado</button>

        <h3>Histórico de Treinos</h3>
        <table id="tabelaTreinos">
            <thead>
                <tr><th>Ave</th><th>Tempo</th><th>Data</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // CREDENCIAIS FIXAS
    const LOGIN_CORRETO = "Beatriz";
    const SENHA_CORRETA = "1234";

    function verificarLogin() {
        const user = document.getElementById('userLogin').value;
        const pass = document.getElementById('userPass').value;

        if(user === LOGIN_CORRETO && pass === SENHA_CORRETA) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            carregarDadosIniciais();
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    // LÓGICA DO SISTEMA
    let aves = JSON.parse(localStorage.getItem('aves_beatriz')) || [];
    let treinos = JSON.parse(localStorage.getItem('treinos_beatriz')) || [];

    function carregarDadosIniciais() {
        atualizarTabelaAves();
        atualizarSelectAves();
        atualizarTabelaTreinos();
    }

    function openTab(tabId) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function adicionarAve() {
        const nome = document.getElementById('aveNome').value;
        const anilha = document.getElementById('aveAnilha').value;
        const nasc = document.getElementById('aveNasc').value;

        if(!nome || !anilha) return alert("Preencha os dados!");

        aves.push({ nome, anilha, nasc });
        salvarNoStorage();
        atualizarTabelaAves();
        atualizarSelectAves();
        
        document.getElementById('aveNome').value = '';
        document.getElementById('aveAnilha').value = '';
    }

    function deletarAve(index) {
        if(confirm("Excluir esta ave?")) {
            aves.splice(index, 1);
            salvarNoStorage();
            atualizarTabelaAves();
            atualizarSelectAves();
        }
    }

    function adicionarTreino() {
        const ave = document.getElementById('selectAve').value;
        const tempo = document.getElementById('treinoTempo').value;
        const data = document.getElementById('treinoData').value;

        if(ave === "" || !tempo) return alert("Preencha o treino!");

        treinos.push({ ave, tempo, data });
        salvarNoStorage();
        atualizarTabelaTreinos();
        document.getElementById('treinoTempo').value = '';
    }

    function salvarNoStorage() {
        localStorage.setItem('aves_beatriz', JSON.stringify(aves));
        localStorage.setItem('treinos_beatriz', JSON.stringify(treinos));
    }

    function atualizarTabelaAves() {
        const corpo = document.querySelector('#tabelaAves tbody');
        corpo.innerHTML = aves.map((a, i) => `
            <tr>
                <td>${a.nome}</td>
                <td>${a.anilha}</td>
                <td>${a.nasc}</td>
                <td><button class="btn-danger" onclick="deletarAve(${i})">X</button></td>
            </tr>
        `).join('');
    }

    function atualizarSelectAves() {
        const select = document.getElementById('selectAve');
        select.innerHTML = aves.map(a => <option value="${a.nome}">${a.nome}</option>).join('');
    }

    function atualizarTabelaTreinos() {
        const corpo = document.querySelector('#tabelaTreinos tbody');
        corpo.innerHTML = treinos.map(t => `
            <tr><td>${t.ave}</td><td>${t.tempo}</td><td>${t.data}</td></tr>
        `).reverse().join('');
    }
</script>

</body>
</html>
