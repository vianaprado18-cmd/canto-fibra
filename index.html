        .topbar { background: #2e8b57; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; }

        .hidden { display: none; }
        ul { list-style: none; padding: 0; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 10px; margin: 5px 0; border-radius: 5px; border-left: 5px solid #2e8b57; }
    </style>
